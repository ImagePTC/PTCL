<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON TECHNOLOGY AND CASTINGS LTD.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="glass-header">
        <div class="nav-left">
            <img src="wmremove-transformed.jpg" alt="Logo" class="logo-img">
            <span class="brand-text">PRECON</span>
        </div>
        <div class="nav-center">
            <select id="catDropdown" onchange="filterItems()">
                <option value="All">All Categories</option>
                <option value="PTCL">PTCL Series</option>
                <option value="Castings">Foundry Castings</option>
            </select>
        </div>
        <div class="nav-right">
            <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterItems()">
        </div>
    </nav>

    <header class="main-hero">
        <div class="hero-content">
            <p class="tagline">WORLD CLASS FOUNDRY</p>
            <h1 class="company-name">PRECON TECHNOLOGY AND CASTINGS LTD.</h1>
            <div class="line-decorator"></div>
        </div>
    </header>

    <section class="slider-section" id="slider">
        <div class="horizontal-scroll" id="productGrid">
            </div>
    </section>

    <footer class="minimal-footer">
        <p>&copy; 2026 PRECON TECHNOLOGY. QUALITY ASSURED.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
