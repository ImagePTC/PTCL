<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON | Industrial Precision</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="images/video (1).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <nav class="navbar">
        <div class="logo">PRECON</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="SEARCH COMPONENTS..." onkeyup="filterProducts()">
        </div>
    </nav>

    <header class="hero">
        <h1>ADVANCED CASTING</h1>
        <p>REDEFINING INDUSTRIAL DURABILITY</p>
    </nav>

    <main class="container">
        <div class="grid" id="gallery">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
