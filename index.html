<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON | Premium Industrial</title>
    <style>
        :root { --accent: #ffd700; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 50px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        /* Essential for 3D Feel */
        .gallery { perspective: 1000px; }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 30px;
            text-align: center;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .product-card:hover {
            transform: rotateX(8deg) rotateY(-8deg) translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .product-card img {
            max-width: 100%;
            height: 200px;
            object-fit: contain;
            transition: transform 0.6s ease;
            /* Professional shadow */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        .product-card:hover img {
            transform: translateZ(50px) scale(1.1);
        }

        .product-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 25px;
            color: #aaa;
        }

        .product-card:hover h3 { color: var(--accent); }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="product-card">
            <img src="images/axle_housing.png" alt="Axle Housing">
            <h3>AXLE HOUSING</h3>
        </div>
        
        <div class="product-card">
            <img src="images/support_structure.png" alt="Support Structure">
            <h3>SUPPORT STRUCTURE</h3>
        </div>
    </div>

</body>
</html>
