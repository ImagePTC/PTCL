<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON TECHNOLOGY AND CASTINGS LTD.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        /* Modal Popup Styles */
        .modal-overlay {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: relative;
            background-color: #1a1a1a;
            margin: 2% auto;
            padding: 10px;
            border: 1px solid #444;
            width: 90%;
            max-width: 900px;
            height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #ff4d4d;
            transform: scale(1.1);
        }

        #modalFrame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        /* Prevent body scroll when modal is open */
        .no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body>

    <nav class="glass-header">
        <div class="nav-left">
            <img src="images/PTCL logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">PTCL</span>
        </div>

        <div class="nav-center">
            <div class="search-container">
                <select id="catDropdown" onchange="filterItems()">
                    <option value="All">All Categories</option>
                    <option value="PTCL">PTCL Series</option>
                </select>
                <div class="search-box">
                    <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterItems()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <!-- Updated Links with Target Blank -->
            <a href="https://www.google.com/maps/place/Precon+Technology+And+Castings+Ltd/@28.2135457,76.8392663,17z/data=!3m1!4b1!4m6!3m5!1s0x390d37f147c89a67:0x16ca4d81c5ee4115!8m2!3d28.213541!4d76.8418412!16s%2Fg%2F12m91xs0j?entry=ttu&g_ep=EgoyMDI1MTExNy4wIKXMDSoASAFQAw%3D%3D" 
               target="_blank" class="nav-icon"><i class="fa-solid fa-location-dot"></i></a>
            
            <a href="https://www.linkedin.com/in/precon-technology-and-casting-ltd-bhiwadi-22129539b/" 
               target="_blank" class="nav-icon"><i class="fa-brands fa-linkedin"></i></a>
            
            <!-- Modal Trigger Buttons -->
            <button class="nav-btn btn-outline" onclick="openFormModal('int.html')">Introduction</button>
            <button class="nav-btn btn-solid" onclick="openFormModal('feedback.html')">Feedback</button>
            <button class="nav-btn btn-solid green-btn">Whatsapp</button>
                  <button class="nav-btn btn-solid yellow-btn">Email</button>
        </div>
    </nav>

    <header class="main-hero">
        <div class="hero-content">
            <p class="tagline">ENGINEERED PRECISION</p>
            <h1 class="company-name">PRECON TECHNOLOGY AND CASTINGS LTD.</h1>
        </div>
    </header>

    <main class="slider-wrapper">
        <div class="nav-arrow left-arrow" onclick="moveSlider('left')"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="tiered-container">
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer layer-3">
                <div class="horizontal-scroll" id="productGrid">
                    <!-- Cards are injected by script.js -->
                </div>
            </div>
        </div>
        <div class="nav-arrow right-arrow" onclick="moveSlider('right')"><i class="fa-solid fa-chevron-right"></i></div>
    </main>

    <footer class="bottom-address-container">
        <p class="footer-address">ADDRESS B-480 RIICO IND. AREA, BHIWADI, RAJASTHAN-301019, INDIA</p>
        <div class="footer-decorators">
            <div class="line-red"></div>
            <div class="star-icon">✦</div>
            <div class="line-red"></div>
        </div>
    </footer>

    <!-- Modal Structure -->
    <div id="formModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeFormModal()">&times;</span>
            <iframe id="modalFrame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Modal Logic
        function openFormModal(url) {
            const modal = document.getElementById('formModal');
            const frame = document.getElementById('modalFrame');
            frame.src = url;
            modal.style.display = 'block';
            document.body.classList.add('no-scroll');
        }

        function closeFormModal() {
            const modal = document.getElementById('formModal');
            const frame = document.getElementById('modalFrame');
            modal.style.display = 'none';
            frame.src = ""; // Stop loading the page in background
            document.body.classList.remove('no-scroll');
        }

        // Close when clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('formModal');
            if (event.target == modal) {
                closeFormModal();
            }
        }
    </script>
</body>
</html>
