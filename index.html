<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON TECHNOLOGY - PTCL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="glass-header">
        <div class="nav-left">
            <img src="images/PTCL logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">PTCL</span>
        </div>

        <div class="nav-center">
            <div class="search-container">
                <select id="catDropdown" onchange="filterItems()">
                    <option value="All">All Categories</option>
                    <option value="PTCL">PTCL Series</option>
                    <option value="Castings">Foundry Castings</option>
                </select>
                <div class="search-box">
                    <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterItems()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <a href="#" class="nav-icon"><i class="fa-solid fa-location-dot"></i></a>
            <a href="#" class="nav-icon"><i class="fa-brands fa-linkedin"></i></a>
            <button class="nav-btn btn-outline" onclick="showIntro()">Introduction</button>
            <button class="nav-btn btn-solid" onclick="showFeedback()">Feedback</button>
            <button class="nav-btn btn-solid red-btn">Contact Us</button>
        </div>
    </nav>

    <!-- Modals (Intro & Feedback) -->
    <div id="introModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeIntro()">&times;</span>
            <iframe src="int.html" id="intFrame"></iframe>
        </div>
    </div>
    <div id="feedbackModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeFeedback()">&times;</span>
            <iframe src="feedback.html" id="feedbackFrame"></iframe>
        </div>
    </div>

    <header class="main-hero">
        <div class="hero-content">
            <p class="tagline">ENGINEERED PRECISION</p>
            <h1 class="company-name">PRECON TECHNOLOGY AND CASTINGS LTD.</h1>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="slider-container">
            <div class="nav-arrow left-arrow"><i class="fa-solid fa-chevron-left"></i></div>
            
            <!-- Layered Slider Background -->
            <div class="slider-layers">
                <div class="layer layer-1"></div>
                <div class="layer layer-2"></div>
                <div class="layer layer-3">
                    <div class="horizontal-scroll" id="productGrid">
                        <!-- Product Cards will load here from script.js -->
                        <!-- Example Structure below -->
                        <div class="p-card">
                            <div class="img-container">
                                <img src="images/support.jpg" alt="Support">
                            </div>
                            <h3>SUPPORT 2432461/62</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-arrow right-arrow"><i class="fa-solid fa-chevron-right"></i></div>
        </section>
    </main>

    <footer class="bottom-address-container">
        <p class="footer-address">ADDRESS B-480 RIICO IND. AREA, BHIWADI, RAJASTHAN-301019, INDIA</p>
        <div class="footer-decorators">
            <div class="line-red"></div>
            <div class="star-icon">✦</div>
            <div class="line-red"></div>
        </div>
    </footer>

    <script>
        function showIntro() { document.getElementById('introModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeIntro() { document.getElementById('introModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function showFeedback() { document.getElementById('feedbackModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeFeedback() { document.getElementById('feedbackModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onclick = function(event) {
            if (event.target.className === 'modal-overlay') { closeIntro(); closeFeedback(); }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
