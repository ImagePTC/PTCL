<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON TECHNOLOGY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        /* Alignment Fixes */
        .main-hero {
            /* Height kam ki taaki text upar chala jaye */
            height: 15vh; 
            display: flex;
            align-items: center; /* Vertical center alignment */
            justify-content: center;
            margin-top: 60px; /* Navbar ke neeche se thoda gap */
            padding-bottom: 0;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .company-name { 
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(20px, 4vw, 45px); 
            font-weight: 800; 
            letter-spacing: -1px; 
            text-transform: uppercase;
            margin: 5px 0; /* Margin kam kiya spacing ke liye */
        }

        .tagline { 
            font-size: 11px; 
            letter-spacing: 4px; 
            opacity: 0.7; 
            text-transform: uppercase;
        }

        /* Footer Address Fixed at Bottom */
        .bottom-address-container {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .footer-address {
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.6;
            text-transform: uppercase;
            margin: 8px 0;
            color: #fff;
            text-align: center;
        }

        .line-decorator {
            width: 35px;
            height: 1.5px;
            background: #ff3333;
            margin: 0 auto;
        }

        /* Slider section ko thoda aur upar laane ke liye */
        .slider-section {
            height: 45vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <nav class="glass-header">
        <div class="nav-left">
            <img src="images/PTCL logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">PTCL</span>
        </div>
        <div class="nav-center">
            <select id="catDropdown" onchange="filterItems()">
                <option value="All">All Categories</option>
                <option value="PTCL">PTCL Series</option>
                <option value="Castings">Foundry Castings</option>
            </select>
        </div>
        <div class="nav-right">
            <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterItems()">
        </div>
    </nav>

    <!-- Header Section (Now shifted up) -->
    <header class="main-hero">
        <div class="hero-content">
            <p class="tagline">ENGINEERED PRECISION</p>
            <h1 class="company-name">PRECON TECHNOLOGY AND CASTINGS LTD.</h1>
        </div>
    </header>

    <section class="slider-section">
        <div class="horizontal-scroll" id="productGrid">
            <!-- Items script.js se load honge -->
        </div>
    </section>

    <!-- Fixed Bottom Address -->
    <footer class="bottom-address-container">
        <p class="footer-address">
            ADDRESS B-480 RIICO IND. AREA, BHIWADI, RAJASTHAN-301019, INDIA
        </p>
        <div class="line-decorator"></div>
        <div class="line-decorator" style="margin-top: 4px;"></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
