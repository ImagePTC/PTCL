<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON TECHNOLOGY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        /* Is CSS ko dhyan se dekhein, ye alignment fix karega */
        .bottom-address-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%; /* Poori width taaki center nikal sake */
            display: flex;
            flex-direction: column;
            align-items: center; /* Horizontally center */
            justify-content: center;
            z-index: 100;
            pointer-events: none; /* Slider ke upar click karne mein rukawat na bane */
        }

        .footer-address {
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
            margin: 8px 0;
            color: #fff;
            text-align: center;
        }

        .line-decorator {
            width: 40px;
            height: 2px;
            background: #ff3333;
            margin: 0 auto;
        }

        /* Thodi extra space slider ke liye */
        .slider-section {
            height: 50vh;
            margin-bottom: 60px; 
        }
    </style>
</head>
<body>

    <nav class="glass-header">
        <div class="nav-left">
            <img src="images/PTCL logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">PTCL</span>
        </div>
        <div class="nav-center">
            <select id="catDropdown" onchange="filterItems()">
                <option value="All">All Categories</option>
                <option value="PTCL">PTCL Series</option>
                <option value="Castings">Foundry Castings</option>
            </select>
        </div>
        <div class="nav-right">
            <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterItems()">
        </div>
    </nav>

    <header class="main-hero">
        <div class="hero-content">
            <p class="tagline">ENGINEERED PRECISION</p>
            <h1 class="company-name">PRECON TECHNOLOGY AND CASTINGS LTD.</h1>
        </div>
    </header>

    <section class="slider-section">
        <div class="horizontal-scroll" id="productGrid">
            <!-- Items script.js se load honge -->
        </div>
    </section>

    <!-- Ye hai updated Footer jo 100% center rahega -->
    <footer class="bottom-address-container">
        <p class="footer-address">
            ADDRESS B-480 RIICO IND. AREA, BHIWADI, RAJASTHAN-301019, INDIA
        </p>
        <div class="line-decorator"></div>
        <div class="line-decorator" style="margin-top: 4px;"></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
