<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON | Industrial Excellence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="cursor-custom"></div>

    <div class="main-bg">
        <video autoplay muted loop playsinline>
            <source src="images/video (1).mp4" type="video/mp4">
        </video>
        <div class="grain-overlay"></div>
    </div>

    <header>
        <div class="logo-area">PRECON</div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="FIND COMPONENT..." onkeyup="filterProducts()">
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h2 class="stroke-text">QUALITY</h2>
            <h1>CASTING</h1>
            <p>ADVANCED FOUNDRY SOLUTIONS FOR THE FUTURE</p>
        </div>
    </section>

    <div class="showcase-section">
        <div class="grid-container" id="gallery">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
