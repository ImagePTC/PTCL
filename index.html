<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON | Industrial Evolution</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-overlay">
        <video autoplay muted loop playsinline>
            <source src="images/video (1).mp4" type="video/mp4">
        </video>
        <div class="v-mask"></div>
    </div>

    <nav class="top-nav">
        <div class="logo">PRECON</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Components..." onkeyup="filterProducts()">
        </div>
    </nav>

    <section class="hero-box">
        <h1 class="glitch-text">ENGINEERING</h1>
        <p>REDEFINING THE FUTURE OF STEEL FOUNDRY</p>
    </section>

    <div class="container">
        <div class="product-grid" id="gallery">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
