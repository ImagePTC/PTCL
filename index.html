<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECON | Industrial Product Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="images/video (1).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <header class="hero">
        <h1 class="main-heading">PRECON PRODUCT</h1>
        <p class="sub-heading">Precision Casting & Industrial Solutions</p>
    </header>

    <nav class="filter-bar">
        <div class="filter-container">
            <select id="categoryFilter" onchange="filterProducts()">
                <option value="All">All Categories</option>
                <option value="PTCL">PTCL</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search industrial parts..." onkeyup="filterProducts()">
        </div>
    </nav>

    <main class="container">
        <div class="gallery" id="gallery">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
