<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precon Technology - Compact Catalogue</title>
    <style>
        :root {
            /* Height kam kar di gayi hai */
            --book-height: 500px; 
            --book-width: 400px;
            --cover-color: #2c3e50;
            --accent-color: #e67e22;
        }

        body {
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px; /* Top se space */
            perspective: 2000px;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* Buttons ko top par lane ke liye */
        .controls { 
            margin-bottom: 30px; 
            display: flex; 
            gap: 20px; 
            z-index: 1000;
        }

        .book-wrapper {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 1s;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .book-wrapper.open { transform: translateX(50%); }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            backface-visibility: hidden;
            background-color: white;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            color: #333;
            overflow: hidden;
        }

        .back { transform: rotateY(180deg); background-color: #f9f9f9; }
        .flipped { transform: rotateY(-180deg); }

        .cover {
            background-color: var(--cover-color) !important;
            color: var(--accent-color) !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 10px solid #1a252f;
        }

        .product-img {
            width: 100%;
            height: 220px; /* Height ke hisaab se image choti ki hai */
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
            background: #eee;
        }

        button {
            padding: 12px 30px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }

        button:hover { background-color: #d35400; }
        button:disabled { background-color: #444; opacity: 0.5; cursor: not-allowed; }

        h2 { font-size: 1.2rem; margin: 5px 0; color: #2c3e50; }
        p { font-size: 0.95rem; line-height: 1.4; color: #555; margin: 5px 0; }
        #loading { color: white; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="loading">Loading Precon Catalogue...</div>

    <!-- Top Buttons -->
    <div class="controls">
        <button id="prevBtn" disabled>PREVIOUS</button>
        <button id="nextBtn">NEXT PAGE</button>
    </div>

    <audio id="flipSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="book-wrapper" id="book"></div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGJDt0TWvLB2xdJoutjaNGdLeAjhVrkyDmuNJ7U86vAKnAqYEPQc7W2K1yTi7XgOyR7jEnug0fpxH3/pub?gid=445615970&single=true&output=csv';
        
        const book = document.querySelector("#book");
        const loading = document.querySelector("#loading");
        const sound = document.querySelector("#flipSound");
        const prevBtn = document.querySelector("#prevBtn");
        const nextBtn = document.querySelector("#nextBtn");

        let currentLocation = 1;
        let papers = [];

        async function init() {
            try {
                const response = await fetch(sheetURL, { cache: 'no-store' });
                const csvData = await response.text();
                
                // Rows parsing with basic CSV logic
                const rows = csvData.split('\n').map(row => {
                    return row.split(',').map(cell => cell.replace(/"/g, "").trim());
                });
                
                const products = rows.filter(r => r.length >= 2).slice(1); 
                createBook(products);
                
                loading.style.display = 'none';
                book.style.display = 'block';
            } catch (error) {
                loading.innerText = "Check your internet or Google Sheet settings.";
            }
        }

        function createBook(data) {
            // Front Cover
            addPaper("PRECON TECHNOLOGY", "INDUSTRIAL CATALOGUE", "https://via.placeholder.com/400x500/2c3e50/e67e22?text=PRECON", true);

            // Dynamic Pages (Title = Col 0, Desc = Col 1, Image = Col 2)
            for (let i = 0; i < data.length; i += 2) {
                const p1 = data[i];
                const p2 = data[i+1] || ["", "End of Catalogue", ""];
                addPaper(p1[0], p1[1], p1[2], false, p2[0], p2[1], p2[2]);
            }

            // Back Cover
            addPaper("CONTACT", "Bhiwadi, Rajasthan", "", false, "FINISH", "Precon Technology", "", true);
            
            papers = document.querySelectorAll(".paper");
            resetZIndex();
        }

        function addPaper(t1, d1, i1, isFC, t2, d2, i2, isBC) {
            const paper = document.createElement("div");
            paper.classList.add("paper");
            paper.innerHTML = `
                <div class="front ${isFC ? 'cover' : ''}">
                    ${i1 ? `<img src="${i1}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t1 || ''}</h2>
                    <p>${d1 || ''}</p>
                </div>
                <div class="back ${isBC ? 'cover' : ''}">
                    ${i2 ? `<img src="${i2}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t2 || ''}</h2>
                    <p>${d2 || ''}</p>
                </div>`;
            book.appendChild(paper);
        }

        function resetZIndex() {
            papers.forEach((p, i) => p.style.zIndex = papers.length - i);
        }

        function playFlip() {
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        nextBtn.addEventListener("click", () => {
            if(currentLocation <= papers.length) {
                playFlip();
                if(currentLocation === 1) book.classList.add("open");
                const p = papers[currentLocation - 1];
                p.classList.add("flipped");
                p.style.zIndex = currentLocation;
                currentLocation++;
                updateBtns();
            }
        });

        prevBtn.addEventListener("click", () => {
            if(currentLocation > 1) {
                playFlip();
                if(currentLocation === 2) book.classList.remove("open");
                const p = papers[currentLocation - 2];
                p.classList.remove("flipped");
                resetZIndex();
                currentLocation--;
                updateBtns();
            }
        });

        function updateBtns() {
            prevBtn.disabled = currentLocation === 1;
            nextBtn.disabled = currentLocation > papers.length;
        }

        init();
    </script>
</body>
</html>
