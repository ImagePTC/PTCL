<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precon Technology Catalogue</title>
    <style>
        :root {
            --book-height: 520px; 
            --book-width: 420px;
            --cover-color: #2c3e50;
            --accent-color: #e67e22;
        }

        body {
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            perspective: 2000px;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .controls { 
            margin-bottom: 30px; 
            display: flex; 
            gap: 20px; 
            z-index: 1000;
        }

        .book-wrapper {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 1s;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .book-wrapper.open { transform: translateX(50%); }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            backface-visibility: hidden;
            background-color: white;
            padding: 30px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            color: #333;
        }

        .back { transform: rotateY(180deg); background-color: #fcfcfc; }
        .flipped { transform: rotateY(-180deg); }

        .cover {
            background-color: var(--cover-color) !important;
            color: var(--accent-color) !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 10px solid #1a252f;
        }

        .product-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
            background: #f0f0f0;
        }

        button {
            padding: 12px 30px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:disabled { background-color: #444; opacity: 0.5; }

        h2 { font-size: 1.4rem; margin: 10px 0; color: #2c3e50; }
        p { font-size: 1rem; line-height: 1.5; color: #444; margin-top: 10px; }
        .page-num { position: absolute; bottom: 15px; right: 20px; font-size: 12px; color: #999; }
        #loading { color: white; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="loading">Updating Data from Sheet...</div>

    <div class="controls">
        <button id="prevBtn" disabled>PREVIOUS</button>
        <button id="nextBtn">NEXT PAGE</button>
    </div>

    <audio id="flipSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="book-wrapper" id="book"></div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGJDt0TWvLB2xdJoutjaNGdLeAjhVrkyDmuNJ7U86vAKnAqYEPQc7W2K1yTi7XgOyR7jEnug0fpxH3/pub?gid=445615970&single=true&output=csv';
        
        const book = document.querySelector("#book");
        const loading = document.querySelector("#loading");
        const sound = document.querySelector("#flipSound");
        const prevBtn = document.querySelector("#prevBtn");
        const nextBtn = document.querySelector("#nextBtn");

        let currentLocation = 1;
        let papers = [];

        async function init() {
            try {
                const response = await fetch(sheetURL, { cache: 'no-store' });
                const csvData = await response.text();
                
                // Smart CSV Parsing (Quotes aur Commas handle karne ke liye)
                const rows = csvData.split('\n').map(row => {
                    const matches = row.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$|\r|\n)/g);
                    return matches ? matches.map(m => m.replace(/^"|"$/g, "").trim()) : [];
                });
                
                const products = rows.filter(r => r.length >= 2).slice(1); 
                createBook(products);
                
                loading.style.display = 'none';
                book.style.display = 'block';
            } catch (error) {
                loading.innerText = "Error loading description. Check Sheet 'Publish' status.";
            }
        }

        function createBook(data) {
            // 1. Cover Page
            addPaper("PRECON TECHNOLOGY", "PTCL Industrial Catalogue", "", true);

            // 2. Data Pages (A=PageNum, B=Title, C=Desc, D=Image)
            for (let i = 0; i < data.length; i += 2) {
                const p1 = data[i];
                const p2 = data[i+1] || ["", "End", "Thank you for visiting.", ""];
                
                // p1[1]=Title, p1[2]=Description, p1[3]=ImageURL
                addPaper(p1[1], p1[2], p1[3], false, p2[1], p2[2], p2[3]);
            }

            // 3. Final Back Page
            addPaper("CONTACT US", "Bhiwadi, Rajasthan", "", false, "FINISH", "Precon Technology & Castings", "", true);
            
            papers = document.querySelectorAll(".paper");
            resetZIndex();
        }

        function addPaper(t1, d1, i1, isFC, t2, d2, i2, isBC) {
            const paper = document.createElement("div");
            paper.classList.add("paper");
            paper.innerHTML = `
                <div class="front ${isFC ? 'cover' : ''}">
                    ${i1 && i1 !== "ImageURL" ? `<img src="${i1}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t1 || ''}</h2>
                    <p>${d1 || ''}</p>
                </div>
                <div class="back ${isBC ? 'cover' : ''}">
                    ${i2 && i2 !== "ImageURL" ? `<img src="${i2}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t2 || ''}</h2>
                    <p>${d2 || ''}</p>
                </div>`;
            book.appendChild(paper);
        }

        function resetZIndex() {
            papers.forEach((p, i) => p.style.zIndex = papers.length - i);
        }

        nextBtn.addEventListener("click", () => {
            if(currentLocation <= papers.length) {
                sound.currentTime = 0; sound.play().catch(()=>{});
                if(currentLocation === 1) book.classList.add("open");
                const p = papers[currentLocation - 1];
                p.classList.add("flipped");
                p.style.zIndex = currentLocation;
                currentLocation++;
                updateBtns();
            }
        });

        prevBtn.addEventListener("click", () => {
            if(currentLocation > 1) {
                sound.currentTime = 0; sound.play().catch(()=>{});
                if(currentLocation === 2) book.classList.remove("open");
                const p = papers[currentLocation - 2];
                p.classList.remove("flipped");
                resetZIndex();
                currentLocation--;
                updateBtns();
            }
        });

        function updateBtns() {
            prevBtn.disabled = currentLocation === 1;
            nextBtn.disabled = currentLocation > papers.length;
        }

        init();
    </script>
</body>
</html>
