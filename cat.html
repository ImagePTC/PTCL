<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precon Technology - Digital Catalogue</title>
    <style>
        :root {
            --book-height: 520px; 
            --book-width: 420px;
            --cover-color: #2c3e50;
            --accent-color: #e67e22;
        }

        body {
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            perspective: 2000px;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .controls { 
            margin-bottom: 30px; 
            display: flex; 
            gap: 20px; 
            z-index: 1000;
        }

        .book-wrapper {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 1s;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .book-wrapper.open { transform: translateX(50%); }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            backface-visibility: hidden;
            background-color: white;
            padding: 30px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            color: #333;
            overflow: hidden;
        }

        .back { transform: rotateY(180deg); background-color: #fcfcfc; }
        .flipped { transform: rotateY(-180deg); }

        .cover {
            background-color: var(--cover-color) !important;
            color: white !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 12px solid #1a252f;
        }

        .cover h2 {
            font-size: 2.2rem !important;
            color: var(--accent-color) !important;
            text-transform: uppercase;
            border-bottom: 3px solid var(--accent-color);
            margin-bottom: 15px;
        }

        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
            background: #f0f0f0;
        }

        button {
            padding: 12px 35px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
        }

        button:hover { background-color: #d35400; transform: translateY(-2px); }
        button:disabled { background-color: #444; opacity: 0.5; cursor: not-allowed; }

        h2 { font-size: 1.3rem; margin: 5px 0; color: #2c3e50; }
        p { font-size: 0.95rem; line-height: 1.5; color: #555; }
        #loading { color: white; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="loading">Connecting to Precon Database...</div>

    <div class="controls">
        <button id="prevBtn" disabled>PREVIOUS</button>
        <button id="nextBtn">NEXT PAGE</button>
    </div>

    <audio id="flipSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="book-wrapper" id="book"></div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGJDt0TWvLB2xdJoutjaNGdLeAjhVrkyDmuNJ7U86vAKnAqYEPQc7W2K1yTi7XgOyR7jEnug0fpxH3/pub?gid=445615970&single=true&output=csv';
        
        async function init() {
            try {
                const response = await fetch(sheetURL, { cache: 'no-store' });
                const csvData = await response.text();
                
                const rows = csvData.split('\n').map(row => {
                    const matches = row.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$|\r|\n)/g);
                    return matches ? matches.map(m => m.replace(/^"|"$/g, "").trim()) : [];
                });
                
                const products = rows.filter(r => r.length >= 2).slice(1); 
                createBook(products);
                
                document.getElementById("loading").style.display = 'none';
                document.getElementById("book").style.display = 'block';
            } catch (error) {
                document.getElementById("loading").innerText = "Error: Check Sheet Permissions.";
            }
        }

        // Google Drive link fixer
        function fixDriveUrl(url) {
            if (!url || url.includes("via.placeholder")) return url;
            if (url.includes("drive.google.com")) {
                let id = "";
                if (url.includes("id=")) {
                    id = url.split("id=")[1].split("&")[0];
                } else {
                    id = url.split("/d/")[1].split("/")[0];
                }
                return `https://lh3.googleusercontent.com/u/0/d/${id}`;
            }
            return url;
        }

        function createBook(data) {
            const coverRow = data.find(row => row[0] == "0") || ["0", "PRECON TECHNOLOGY", "Catalogue 2026", ""];
            addPaper(coverRow[1], coverRow[2], coverRow[3], true);

            const content = data.filter(row => row[0] != "0").sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
            
            for (let i = 0; i < content.length; i += 2) {
                const p1 = content[i];
                const p2 = content[i+1] || ["", "END", "Thank you.", ""];
                addPaper(p1[1], p1[2], p1[3], false, p2[1], p2[2], p2[3]);
            }

            addPaper("CONTACT US", "Bhiwadi, Rajasthan", "", false, "THANK YOU", "Precon Technology", "", true);
            
            setupFlipLogic();
        }

        function addPaper(t1, d1, i1, isFC, t2, d2, i2, isBC) {
            const paper = document.createElement("div");
            paper.classList.add("paper");
            const img1 = fixDriveUrl(i1);
            const img2 = fixDriveUrl(i2);

            paper.innerHTML = `
                <div class="front ${isFC ? 'cover' : ''}">
                    ${img1 ? `<img src="${img1}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t1 || ''}</h2>
                    <p>${d1 || ''}</p>
                </div>
                <div class="back ${isBC ? 'cover' : ''}">
                    ${img2 ? `<img src="${img2}" class="product-img" onerror="this.style.display='none'">` : ''}
                    <h2>${t2 || ''}</h2>
                    <p>${d2 || ''}</p>
                </div>`;
            document.getElementById("book").appendChild(paper);
        }

        function setupFlipLogic() {
            const papers = document.querySelectorAll(".paper");
            const prevBtn = document.querySelector("#prevBtn");
            const nextBtn = document.querySelector("#nextBtn");
            const book = document.querySelector("#book");
            const sound = document.querySelector("#flipSound");
            let currentLoc = 1;

            const resetZ = () => papers.forEach((p, i) => p.style.zIndex = papers.length - i);
            resetZ();

            nextBtn.addEventListener("click", () => {
                if(currentLoc <= papers.length) {
                    sound.currentTime = 0; sound.play().catch(()=>{});
                    if(currentLoc === 1) book.classList.add("open");
                    const p = papers[currentLoc - 1];
                    p.classList.add("flipped");
                    p.style.zIndex = currentLoc;
                    currentLoc++;
                    prevBtn.disabled = false;
                    if(currentLoc > papers.length) nextBtn.disabled = true;
                }
            });

            prevBtn.addEventListener("click", () => {
                if(currentLoc > 1) {
                    sound.currentTime = 0; sound.play().catch(()=>{});
                    if(currentLoc === 2) book.classList.remove("open");
                    const p = papers[currentLoc - 2];
                    p.classList.remove("flipped");
                    resetZ();
                    currentLoc--;
                    nextBtn.disabled = false;
                    if(currentLoc === 1) prevBtn.disabled = true;
                }
            });
        }

        init();
    </script>
</body>
</html>
